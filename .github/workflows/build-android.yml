name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -name "index.html" -exec cp {} www/ \;
        find . -name "style.css" -exec cp {} www/ \;
        find . -name "game.js" -exec cp {} www/ \;
        find . -name "storage.js" -exec cp {} www/ \;
        
        if [ -d "assets" ]; then
          cp -r assets www/
        fi
        
        if [ ! -f www/index.html ]; then
          echo "Error: index.html not found!"
          exit 1
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor
      run: npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    # بازگشت به جاوای مورد نیاز سیستم (نسخه ۱۷)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync Web assets to Android
      run: npx cap sync

    # بخش طلایی: قفل کردن نسخه گریدل روی نسخه بدون باگ ۸.۲ قبل از شروع کامپایل
    - name: Fix Gradle Bug & Force Stable Version
      run: |
        cd android
        ./gradlew wrapper --gradle-version 8.2 --distribution-type bin

    # بیلد کاملاً تمیز و مستقل بدون دخالت کش مخرب
    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean
        ./gradlew assembleDebug --no-build-cache --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
