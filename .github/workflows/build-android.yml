name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -maxdepth 1 -name "index.html" -exec cp {} www/ \;
        find . -maxdepth 1 -name "style.css" -exec cp {} www/ \;
        find . -maxdepth 1 -name "game.js" -exec cp {} www/ \;
        find . -maxdepth 1 -name "storage.js" -exec cp {} www/ \;
        
        if [ -d "assets" ]; then
          cp -r assets www/
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor
      run: npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    # 🎯 تنظیم کلیدی جدید: حل مشکل پکیج بدون خراب کردن سینتکس
    - name: Force Clean Build Strategy
      run: |
        echo "configurations.all { resolutionStrategy.force 'org.bouncycastle:bcprov-jdk18on:1.74' }" >> android/build.gradle
        echo "org.gradle.dependency.verification=off" >> android/gradle.properties

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync Web assets to Android
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean
        ./gradlew assembleDebug --no-build-cache --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
