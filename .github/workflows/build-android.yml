name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -maxdepth 1 -name "index.html" -exec cp {} www/ \;
        find . -maxdepth 1 -name "style.css" -exec cp {} www/ \;
        find . -maxdepth 1 -name "game.js" -exec cp {} www/ \;
        find . -maxdepth 1 -name "storage.js" -exec cp {} www/ \;
        
        if [ -d "assets" ]; then
          cp -r assets www/
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor
      run: npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    # 🎯 تزریق مستقیم و بدون نقص برای حل تداخل پکیج bcprov در گریدل کپسیتور
    - name: Bypass and Fix Broken Jar Dependency
      run: |
        echo "subprojects {
            project.configurations.all {
                resolutionStrategy.eachDependency { details ->
                    if (details.requested.group == 'org.bouncycastle' && details.requested.name.contains('bcprov')) {
                        details.useVersion '1.74'
                        details.because 'Fix broken 1.79 jar execution on github runner caching'
                    }
                }
            }
        }" >> android/build.gradle

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync Web assets to Android
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean
        ./gradlew assembleDebug --no-build-cache --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
