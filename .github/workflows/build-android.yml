name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -maxdepth 1 -name "index.html" -exec cp {} www/ \;
        find . -maxdepth 1 -name "style.css" -exec cp {} www/ \;
        find . -maxdepth 1 -name "game.js" -exec cp {} www/ \;
        find . -maxdepth 1 -name "storage.js" -exec cp {} www/ \;
        
        if [ -d "assets" ]; then
          cp -r assets www/
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor
      run: npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 🎯 تیر خلاص: دانلود فایل سالم و تزریق آن مستقیم به حافظه جاوا برای دور زدن دانلودهای گریدل
    - name: Inject Valid Security Jar into Java Cache
      run: |
        mkdir -p $HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk18on/1.79
        curl -L -o bcprov.jar https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/1.79/bcprov-jdk18on-1.79.jar
        # پیدا کردن مسیر دقیق گریدل و کپی کردن فایل برای مسدود کردن دانلودهای مخرب بعدی
        find $HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk18on/1.79/ -type d -exec cp bcprov.jar {}/bcprov-jdk18on-1.79.jar \; 2>/dev/null || true
        echo "org.gradle.dependency.verification=off" >> android/gradle.properties
        echo "org.gradle.daemon=false" >> android/gradle.properties

    - name: Sync Web assets to Android
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean
        ./gradlew assembleDebug --no-build-cache --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
