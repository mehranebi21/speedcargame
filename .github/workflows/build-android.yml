name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ۱. آپدیت به نسخه ۴ برای دانلود کدها
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # ۲. آپدیت به نسخه ۴ برای راه‌اندازی Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "CarGame" "com.yourname.cargame" --web-dir=. --noprompt

    - name: Add Android Platform
      run: npx cap add android

    # ۳. آپدیت به نسخه ۴ برای نصب جاوا ۱۷
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync Web assets to Android
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android && ./gradlew assembleDebug

    # ۴. آپدیت حیاتی به نسخه ۴ جهت آپلود و دانلود فایل خروجی APK (حل مشکل ارور شما)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
