name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # این بخش با هوشمندی فایل‌ها را در هر فولدری که باشند پیدا کرده و ساختار را منظم می‌کند
    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -name "index.html" -exec cp {} www/ \;
        find . -name "style.css" -exec cp {} www/ \;
        find . -name "game.js" -exec cp {} www/ \;
        find . -name "storage.js" -exec cp {} www/ \;
        
        # بررسی وجود فایل اصلی برای جلوگیری از ارورهای بعدی
        if [ ! -f www/index.html ]; then
          echo "خطا: فایل index.html در هیچ پوشه‌ای پیدا نشد! لطفاً نام فایل را در گیت‌هاب چک کنید."
          exit 1
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync Web assets to Android
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android && ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
