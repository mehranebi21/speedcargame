name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    # تغییر به نسخه ۲۲ اوبونتو برای فرار از کش معیوب نسخه جدید اوبونتو
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -maxdepth 1 -name "index.html" -exec cp {} www/ \;
        find . -maxdepth 1 -name "style.css" -exec cp {} www/ \;
        find . -maxdepth 1 -name "game.js" -exec cp {} www/ \;
        find . -maxdepth 1 -name "storage.js" -exec cp {} www/ \;
        
        if [ -d "assets" ]; then
          cp -r assets www/
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor
      run: npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    # 🎯 تیر خلاص: حذف تایید وابستگی‌ها و اجبار گریدل به نادیده گرفتن خطای فایل bcp
    - name: Configure Clean Environment
      run: |
        echo "org.gradle.dependency.verification=off" >> android/gradle.properties
        echo "org.gradle.daemon=false" >> android/gradle.properties
        sed -i 's/mavenCentral()/mavenCentral()\n    maven { url "https://plugins.gradle.org/m2/" }/g' android/build.gradle

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync Web assets to Android
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug --no-build-cache --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
