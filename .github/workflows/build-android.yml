name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -name "index.html" -exec cp {} www/ \;
        find . -name "style.css" -exec cp {} www/ \;
        find . -name "game.js" -exec cp {} www/ \;
        find . -name "storage.js" -exec cp {} www/ \;
        
        if [ ! -f www/index.html ]; then
          echo "Error: index.html not found!"
          exit 1
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    # آپدیت به نسخه ۲۱ جاوا برای حل ارور کتابخانه bcprov
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Sync Web assets to Android
      run: npx cap sync

    # تمیز کردن کش و بیلد نهایی
    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
