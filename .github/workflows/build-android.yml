name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # این بخش پوشه assets را هم در صورت وجود به مسیر کامپایل منتقل می‌کند
    - name: Prepare Web Assets Folder
      run: |
        mkdir -p www
        find . -name "index.html" -exec cp {} www/ \;
        find . -name "style.css" -exec cp {} www/ \;
        find . -name "game.js" -exec cp {} www/ \;
        find . -name "storage.js" -exec cp {} www/ \;
        
        # انتقال ساختار پوشه assets به درون فولدر بیلد
        if [ -d "assets" ]; then
          cp -r assets www/
        elif [ -d "www/assets" ]; then
          echo "Assets folder already in place."
        else
          mkdir -p www/assets/images www/assets/sounds www/assets/fonts
        fi
        
        if [ ! -f www/index.html ]; then
          echo "Error: index.html not found!"
          exit 1
        fi

    - name: Install Capacitor & Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "CarGame" "com.yourname.cargame" --web-dir=www

    - name: Add Android Platform
      run: npx cap add android

    # استفاده از نسخه پایدار ۲۱ جاوا
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Sync Web assets to Android
      run: npx cap sync

    # دستورات ویژه برای شکستن قفل کش گریدل و متوقف کردن تداخلهای Jar
    - name: Build Android APK
      run: |
        cd android
        ./gradlew --no-daemon clean
        ./gradlew assembleDebug --no-build-cache --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
